<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaeser Compresores | Calculadora de Eficiencia</title>
  <meta name="description" content="Calculadora de pérdidas energéticas en sistemas de aire comprimido. Auditoría de Demanda de Aire (ADA) - Kaeser Compresores." />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel para compilar JSX en el navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons (versión vanilla) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    /* Animación de aparición de resultados */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-result { animation: fadeInUp 0.5s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    // ====== Helper: ícono Lucide como componente React ======
    // Renderiza un <i> con el data-lucide y luego lucide reemplaza por SVG.
    function Icon({ name, className }) {
      const ref = React.useRef(null);
      React.useEffect(() => {
        if (window.lucide && ref.current) {
          // Limpia y vuelve a crear el ícono
          ref.current.innerHTML = '';
          const i = document.createElement('i');
          i.setAttribute('data-lucide', name);
          if (className) i.className = className;
          ref.current.appendChild(i);
          window.lucide.createIcons();
        }
      });
      return <span ref={ref} className={className}></span>;
    }

    function App() {
      const initialState = {
        hp: 50,
        hours: 6000,
        kwhCost: 800,
        pressureDrop: 15,
        efficiency: 18,
        leakPercentage: 20
      };

      const [formData, setFormData] = useState(initialState);
      const [results, setResults] = useState(null);

      const handleChange = (e) => {
        const { name, value } = e.target;
        setFormData({
          ...formData,
          [name]: parseFloat(value) || ''
        });
      };

      const calcularPerdidas = () => {
        if (!formData.hp) return;

        const flowCFM = formData.hp * 4;
        const eff = formData.efficiency || 18;

        const annualEnergyBase = (flowCFM / 100) * eff * formData.hours;

        const flowLeaks = flowCFM * (formData.leakPercentage / 100);
        const energyLeaks = (flowLeaks / 100) * eff * formData.hours;
        const costLeaks = energyLeaks * formData.kwhCost;

        const deltaP = formData.pressureDrop || 0;
        let penaltyPercent = (deltaP / 2) * 0.01;
        if (penaltyPercent > 0.4) penaltyPercent = 0.4;

        const costPD = annualEnergyBase * penaltyPercent * formData.kwhCost;

        setResults({
          cfm: flowCFM,
          deltaP: deltaP,
          costLeaks: costLeaks,
          costPD: costPD,
          totalCost: costLeaks + costPD
        });
      };

      const limpiarFormulario = () => {
        setFormData(initialState);
        setResults(null);
      };

      const formatCOP = (value) => {
        return new Intl.NumberFormat('es-CO', {
          style: 'currency',
          currency: 'COP',
          maximumFractionDigits: 0
        }).format(value);
      };

      return (
        <div className="min-h-screen bg-gray-100 font-sans text-gray-800">
          {/* Header */}
          <header className="bg-[#FFCC00] text-gray-900 shadow-md border-b-4 border-gray-900">
            <div className="max-w-6xl mx-auto px-4 py-6 flex flex-col md:flex-row justify-between items-center">
              <div>
                <h1 className="text-3xl font-black uppercase tracking-tight flex items-center gap-2">
                  <Icon name="wind" className="w-8 h-8" />
                  Kaeser Compresores
                </h1>
                <p className="text-sm font-semibold tracking-wide mt-1">Expoindustrial Valle del Cauca</p>
              </div>
              <div className="mt-4 md:mt-0 text-right hidden md:block">
                <h2 className="text-xl font-bold">Calculadora de Eficiencia</h2>
                <p className="text-sm">Auditoría de Aire Comprimido</p>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-8">
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">

              {/* Formulario */}
              <div className="lg:col-span-7 bg-white rounded-xl shadow-xl overflow-hidden border border-gray-200">
                <div className="bg-gray-900 text-white px-6 py-4 flex items-center gap-2">
                  <Icon name="settings" className="w-5 h-5 text-yellow-400" />
                  <h3 className="text-lg font-bold">Parámetros del Sistema</h3>
                </div>

                <div className="p-6 space-y-6">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {/* Potencia */}
                    <div>
                      <label className="text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                        <Icon name="activity" className="w-4 h-4 text-blue-600" /> Potencia Instalada (HP)
                      </label>
                      <input
                        type="number" name="hp" value={formData.hp} onChange={handleChange}
                        className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none transition-all"
                        placeholder="Ej. 50"
                      />
                      <p className="text-xs text-gray-500 mt-1">
                        Generación estimada: <span className="font-bold text-gray-800">{formData.hp ? formData.hp * 4 : 0} CFM</span>
                      </p>
                    </div>

                    {/* Horas */}
                    <div>
                      <label className="text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                        <Icon name="clock" className="w-4 h-4 text-green-600" /> Horas de Operación / Año
                      </label>
                      <input
                        type="number" name="hours" value={formData.hours} onChange={handleChange}
                        className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none transition-all"
                        placeholder="Ej. 6000"
                      />
                    </div>

                    {/* Costo Energía */}
                    <div>
                      <label className="text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                        <Icon name="dollar-sign" className="w-4 h-4 text-yellow-600" /> Costo Energía ($/kWh)
                      </label>
                      <input
                        type="number" name="kwhCost" value={formData.kwhCost} onChange={handleChange}
                        className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none transition-all"
                        placeholder="Ej. 800"
                      />
                    </div>

                    {/* Eficiencia */}
                    <div>
                      <label className="text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                        <Icon name="settings" className="w-4 h-4 text-gray-600" /> Eficiencia (kW/100 CFM)
                      </label>
                      <input
                        type="number" name="efficiency" value={formData.efficiency} onChange={handleChange}
                        className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none transition-all"
                        placeholder="Opcional. Ej. 18"
                      />
                    </div>
                  </div>

                  <hr className="border-gray-200" />

                  {/* Caída de Presión */}
                  <div className="bg-white p-4 rounded-lg border border-gray-200">
                    <label className="text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                      <Icon name="activity" className="w-4 h-4 text-orange-600" /> Caída de Presión Estimada (PSI)
                    </label>
                    <input
                      type="number" name="pressureDrop" value={formData.pressureDrop} onChange={handleChange}
                      className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none transition-all bg-gray-50"
                      placeholder="Ej. 15"
                    />
                    <p className="text-xs text-gray-500 mt-2">
                      Ingrese la caída de presión entre el cuarto de compresores y el punto de uso.
                      <strong> Regla:</strong> Cada 2 PSI de caída representan ~1% de energía extra consumida.
                    </p>
                  </div>

                  {/* Slider de Fugas */}
                  <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <label className="flex justify-between items-center text-sm font-bold text-gray-700 mb-4">
                      <span className="flex items-center gap-2">
                        <Icon name="wind" className="w-4 h-4 text-teal-600" /> Nivel de Fugas Estimado
                      </span>
                      <span className="bg-white px-3 py-1 rounded shadow-sm border border-gray-200 text-lg">
                        {formData.leakPercentage}%
                      </span>
                    </label>
                    <input
                      type="range" name="leakPercentage" min="0" max="50" step="1"
                      value={formData.leakPercentage} onChange={handleChange}
                      className="w-full h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-yellow-500"
                    />
                    <div className="flex justify-between text-xs text-gray-500 mt-2">
                      <span>Optimizada (0-5%)</span>
                      <span>Promedio (20-30%)</span>
                      <span>Crítico (50%)</span>
                    </div>
                  </div>

                  {/* Botones */}
                  <div className="flex gap-4 pt-4">
                    <button
                      onClick={calcularPerdidas}
                      className="flex-1 bg-[#FFCC00] hover:bg-yellow-500 text-gray-900 font-bold py-4 px-6 rounded-lg shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2 text-lg uppercase tracking-wide"
                    >
                      <Icon name="calculator" className="w-6 h-6" /> Calcular Pérdidas
                    </button>
                    <button
                      onClick={limpiarFormulario}
                      className="bg-gray-800 hover:bg-gray-900 text-white font-bold py-4 px-6 rounded-lg shadow-md transition-all flex items-center justify-center"
                      title="Limpiar datos"
                    >
                      <Icon name="rotate-ccw" className="w-6 h-6" />
                    </button>
                  </div>
                </div>
              </div>

              {/* Panel de Resultados */}
              <div className="lg:col-span-5">
                {results ? (
                  <div className="bg-white rounded-xl shadow-xl overflow-hidden border-2 border-red-500 animate-result">
                    <div className="bg-red-600 text-white px-6 py-5 flex items-center gap-3">
                      <Icon name="alert-triangle" className="w-7 h-7" />
                      <h3 className="text-xl font-black uppercase tracking-wide">Impacto Financiero Anual</h3>
                    </div>

                    <div className="p-6">
                      <p className="text-gray-600 text-center mb-6 text-sm font-medium">
                        Su sistema produce <span className="font-bold text-gray-900">{results.cfm.toFixed(0)} CFM</span>.
                        El costo total asociado a las ineficiencias de su red es:
                      </p>

                      <div className="text-center bg-red-50 rounded-xl py-6 border border-red-100 mb-6 shadow-inner">
                        <span className="block text-red-800 font-bold mb-1 uppercase text-sm tracking-wider">Total Dinero Perdido / Año</span>
                        <span className="text-4xl md:text-5xl font-black text-red-600 tracking-tighter">
                          {formatCOP(results.totalCost)}
                        </span>
                      </div>

                      <div className="space-y-4">
                        <div className="bg-gray-50 p-4 rounded-lg flex justify-between items-center border border-gray-100">
                          <div>
                            <span className="font-bold text-gray-800 flex items-center gap-2">
                              <Icon name="wind" className="w-4 h-4 text-teal-600" /> Pérdidas por Fugas
                            </span>
                            <span className="text-xs text-gray-500">Al {formData.leakPercentage}% de volumen</span>
                          </div>
                          <span className="font-bold text-lg text-gray-700">{formatCOP(results.costLeaks)}</span>
                        </div>

                        <div className="bg-gray-50 p-4 rounded-lg flex justify-between items-center border border-gray-100">
                          <div>
                            <span className="font-bold text-gray-800 flex items-center gap-2">
                              <Icon name="activity" className="w-4 h-4 text-orange-500" /> Fricción / Caída Presión
                            </span>
                            <span className="text-xs text-gray-500">Caída est: {results.deltaP.toFixed(2)} psi</span>
                          </div>
                          <span className="font-bold text-lg text-gray-700">{formatCOP(results.costPD)}</span>
                        </div>
                      </div>

                      <div className="mt-8 bg-yellow-50 border border-yellow-200 p-4 rounded-lg text-center">
                        <p className="text-sm text-yellow-800 font-bold mb-2">¡Kaeser puede ayudarle a recuperar este dinero!</p>
                        <p className="text-xs text-yellow-700">Solicite una <strong>Auditoría de Demanda de Aire (ADA)</strong> con nuestros ingenieros hoy mismo en el stand.</p>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="h-full bg-gray-200 rounded-xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center p-8 text-center min-h-[400px]">
                    <Icon name="calculator" className="w-16 h-16 text-gray-400 mb-4 opacity-50" />
                    <h3 className="text-xl font-bold text-gray-500 mb-2">Resultados del Análisis</h3>
                    <p className="text-gray-400 text-sm">Ingrese los datos de su planta y presione "Calcular Pérdidas" para ver el impacto financiero anual.</p>
                  </div>
                )}
              </div>
            </div>
          </main>

          <footer className="text-center text-xs text-gray-500 py-6">
            © Kaeser Compresores · Calculadora de Auditoría de Aire Comprimido
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
